name: Android Build

on:
  push:
    branches:
      - "claude/engineering-survey-app-8dEYZ"
      - "main"
      - "master"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11'
          cache-read-only: false

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Show compiler errors
        if: failure()
        run: |
          echo "====== JAVA ERRORS ======"
          grep -n "^.*\.java:[0-9]*: error:" /tmp/build.log | head -40 || true
          echo "====== LAST 80 LINES ======"
          tail -80 /tmp/build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/tmp/compileDebugJavaWithJavac/
          retention-days: 3
