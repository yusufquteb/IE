name: Android Build

on:
  push:
    branches:
      - "claude/engineering-survey-app-8dEYZ"
      - "main"
      - "master"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Show environment
        run: |
          ./gradlew --version
          echo "=== Installed platforms ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "=== Build tools ==="
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Write build errors to Step Summary
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -300 /tmp/build.log 2>/dev/null || echo "(no build log — failure was before Build step)"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Key error lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -n "error:\|FAILED\|Exception\|Cannot resolve\|Could not find\|Failed to find\|warning: \[" /tmp/build.log 2>/dev/null | head -60 >> $GITHUB_STEP_SUMMARY || echo "(none found)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Last 100 lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/build.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no build log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Show build errors
        if: failure()
        run: |
          echo "====== FIRST 200 LINES ======"
          head -200 /tmp/build.log || true
          echo "====== ALL ERROR LINES (full context) ======"
          grep -n "error:\|FAILED\|Exception\|Cannot resolve\|Could not find\|Failed to find\|warning: \[" /tmp/build.log | head -80 || true
          echo "====== LAST 150 LINES ======"
          tail -150 /tmp/build.log || true

      - name: Upload full build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 3

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Post build errors as PR comment
        if: failure() && github.event_name == 'pull_request'
        run: |
          {
            echo "## CI Build Failed — Error Summary"
            echo ""
            echo "**Key errors:**"
            echo "\`\`\`"
            grep -n "error:\|FAILED\|Exception\|Cannot resolve\|Could not find\|Failed to find" /tmp/build.log 2>/dev/null | head -40 || echo "(no build log — check Show environment step)"
            echo "\`\`\`"
            echo "**Last 60 lines of build log:**"
            echo "\`\`\`"
            tail -60 /tmp/build.log 2>/dev/null || echo "(no build log)"
            echo "\`\`\`"
          } > /tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/tmp/compileDebugJavaWithJavac/
          retention-days: 3
