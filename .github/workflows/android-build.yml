name: Android Build

on:
  push:
    branches:
      - "claude/engineering-survey-app-8dEYZ"
      - "main"
      - "master"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11'
          cache-read-only: false

      - name: Show Gradle version and available Android SDK
        run: |
          gradle --version
          echo "=== Installed platforms ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          echo "=== Build tools ==="
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Show build errors
        if: failure()
        run: |
          echo "====== FIRST 120 LINES ======"
          head -120 /tmp/build.log || true
          echo "====== ALL ERROR LINES ======"
          grep -n "error:\|FAILED\|Exception\|Cannot resolve\|Could not find\|Failed to find" /tmp/build.log | head -50 || true
          echo "====== LAST 100 LINES ======"
          tail -100 /tmp/build.log || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/tmp/compileDebugJavaWithJavac/
          retention-days: 3
